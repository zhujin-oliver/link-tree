<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>主页 | 专注机器人学与强化学习</title>
  <style>
    /* CSS Variables: 明亮毛玻璃主题 (样式保持不变，直接跳到 HTML 内容部分) */
    :root {
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #6366f1;
      --card-bg: rgba(255, 255, 255, 0.55);
      --card-hover: rgba(255, 255, 255, 0.9);
      --border-color: rgba(255, 255, 255, 0.6);
      --radius: 24px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(-45deg, #e0e7ff, #c7d2fe, #ddd6fe, #f3e8ff);
      background-size: 400% 400%; animation: gradientBG 15s ease infinite;
      color: var(--text-main); font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6; display: flex; justify-content: center; min-height: 100vh; padding: 40px 20px;
    }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container { width: 100%; max-width: 640px; }
    .profile { text-align: center; margin-bottom: 40px; animation: fadeInDown 0.8s ease-out; }
    .avatar { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255, 255, 255, 0.8); margin-bottom: 16px; box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2); }
    .name { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 8px; color: #0f172a; }
    .bio { font-size: 0.95rem; color: var(--text-muted); max-width: 85%; margin: 0 auto; font-weight: 500; }
    .bento-grid { display: grid; grid-template-columns: 1fr; gap: 16px; animation: fadeInUp 0.8s ease-out; }
    .bento-card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 24px; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; transition: var(--transition); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02), 0 10px 15px rgba(0, 0, 0, 0.03); }
    a.bento-card:hover { background: var(--card-hover); transform: translateY(-5px) scale(1.01); box-shadow: 0 20px 30px rgba(99, 102, 241, 0.15); border-color: rgba(255, 255, 255, 0.9); }
    div.card-highlight { background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(224, 231, 255, 0.6) 100%); border: 1px solid rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; gap: 20px; }
    .card-header { display: flex; flex-direction: column; }
    .card-highlight .card-icon { color: var(--accent); background: rgba(99, 102, 241, 0.1); padding: 8px; border-radius: 12px; width: 44px; height: 44px; margin-bottom: 12px; }
    .course-links { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .course-link { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 16px; text-decoration: none; color: var(--text-main); transition: var(--transition); }
    .course-link:hover { background: #ffffff; transform: translateX(6px); border-color: var(--accent); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.12); }
    .course-info { display: flex; flex-direction: column; }
    .course-name { font-weight: 700; font-size: 0.95rem; color: #0f172a; }
    .course-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .course-status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; margin-left: 12px; }
    .status-active { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
    .status-update { background: rgba(16, 185, 129, 0.1); color: #059669; }
    .status-plan { background: rgba(100, 116, 139, 0.1); color: #64748b; }
    .card-disabled { opacity: 0.7; cursor: pointer; background: rgba(255, 255, 255, 0.3); border: 1px dashed rgba(100, 116, 139, 0.3); box-shadow: none; }
    .card-disabled:hover { background: rgba(255, 255, 255, 0.5); }
    .card-disabled .card-icon { color: #94a3b8; }
    .card-icon { width: 34px; height: 34px; margin-bottom: 16px; color: #475569; transition: var(--transition); }
    a.bento-card:hover .card-icon { color: var(--accent); transform: scale(1.1); }
    .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .card-subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .toast-container { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 16px 28px; border-radius: 50px; font-size: 0.95rem; font-weight: 500; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; text-align: center; white-space: nowrap; }
    .toast-container.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 600px) {
      .bento-grid { grid-template-columns: repeat(2, 1fr); }
      div.card-highlight { grid-column: span 2; flex-direction: row; align-items: center; padding: 32px; gap: 32px; }
      .card-highlight .card-header { flex: 0 0 35%; }
      .card-highlight .card-icon { margin-bottom: 16px; width: 54px; height: 54px; padding: 10px; }
      .card-highlight .card-title { font-size: 1.4rem; }
      .card-highlight .course-links { flex: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="profile">
      <img src="./avatar.jpg" alt="Avatar" class="avatar">
      <h1 class="name">爱学习的皮卡菟</h1>
      <p class="bio">专注机器人学与强化学习｜深耕理论 · 算法 · 仿真</p>
    </header>

    <main class="bento-grid">
      
      <div class="bento-card card-highlight">
        <div class="card-header">
          <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <div class="card-content">
            <div class="card-title">体系课程</div>
            <div class="card-subtitle">从核心理论、算法实现到仿真闭环</div>
          </div>
        </div>

        <div class="course-links">
          
          <a href="javascript:void(0);" class="course-link" style="opacity: 0.6; cursor: default;">
            <div class="course-info">
              <span class="course-name">强化学习理论与实践</span>
              <span class="course-desc">全面修订中，配套 CleanRL 源码与硬核作业</span>
            </div>
            <span class="course-status status-update">修订中</span>
          </a>

          <a href="javascript:void(0);" class="course-link" style="opacity: 0.6; cursor: default;">
            <div class="course-info">
              <span class="course-name">机器人学理论讲义</span>
              <span class="course-desc">核心理论系统推导与底层算法精讲</span>
            </div>
            <span class="course-status status-update">修订中</span>
          </a>

          <a href="javascript:void(0);" class="course-link" style="opacity: 0.6; cursor: default;">
            <div class="course-info">
              <span class="course-name">机器人仿真与实践</span>
              <span class="course-desc">涵盖地图导航与人形/四足机器人控制</span>
            </div>
            <span class="course-status status-plan">筹备中</span>
          </a>

        </div>
      </div>

      <a href="https://mp.weixin.qq.com/s/b_T2AmoHQHqfMVJz2pcuPw" target="_blank" class="bento-card">
        <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
        <div class="card-content">
          <div class="card-title">深度干货</div>
          <div class="card-subtitle">逐字打磨的系统性硬核图文</div>
        </div>
      </a>

      <a href="https://xhslink.com/m/Aqw1W4bzoDo" target="_blank" class="bento-card">
        <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
        <div class="card-content">
          <div class="card-title">日常交流</div>
          <div class="card-subtitle">创作思考与日常技术探讨</div>
        </div>
      </a>

      <div class="bento-card card-disabled disabled" id="planetCard">
        <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="card-content">
          <div class="card-title">
            硬核知识星球 
            <svg style="width: 14px; height: 14px; color: #94a3b8;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <div class="card-subtitle">专注技术答疑，带你少走弯路</div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast" class="toast-container">
    硬核知识星球筹备中，敬请期待！<br>欢迎喜欢探讨技术的朋友，跟我一起少走弯路。
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const planetCard = document.getElementById('planetCard');
      const toast = document.getElementById('toast');
      let toastTimeout;

      planetCard.addEventListener('click', (e) => {
        e.preventDefault();
        clearTimeout(toastTimeout);
        toast.classList.add('show');
        if (navigator.vibrate) { navigator.vibrate(50); }
        toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
      });
    });
  </script>
</body>
</html>
